<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario - RutaBinaria</title>
    <link rel="stylesheet" href="style.css"><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div id="bus-status" style="font-weight:bold; color:#9ca3af;">Esperando señal...</div>
            <button onclick="centerBus()" id="re-track" style="width:auto; padding:8px 15px; display:none; background:#3b82f6; font-size:0.7rem;">Re-centrar</button>
        </div>
        <div id="timer-box" class="card" style="display:none; border:3px solid #ec4899;">
            <p style="text-align:center; color:#ec4899; font-weight:bold; margin:0;">TIEMPO EN PARADA</p>
            <h1 id="count-ui">00:00</h1>
        </div>
        <div id="itinerary"></div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        let map, busMarker, stopMarkers = [], busPos = null;
        const busIcon = L.divIcon({ html: '🚍', className: 'bus-icon-style', iconSize: [35, 35], iconAnchor: [17, 17] });

        window.onload = async function() {
            map = L.map('map').setView([13.4795, -88.1729], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // CARGA INICIAL Y REALTIME
            const { data } = await window.db.from('bus_location').select('*').eq('id', 1).single();
            if(data) updateBusUI(data);

            window.db.channel('bus-live').on('postgres_changes', {event:'UPDATE', table:'bus_location'}, p => updateBusUI(p.new)).subscribe();

            loadData();
            setInterval(loadData, 5000);
            setInterval(runClock, 1000);
        };

        function updateBusUI(data) {
            const statusLabel = document.getElementById('bus-status');
            const trackBtn = document.getElementById('re-track');
            if(data.lat && data.lng) {
                busPos = [data.lat, data.lng];
                statusLabel.innerText = "● EN VIVO"; statusLabel.style.color = "#22c55e";
                trackBtn.style.display = "block";
                if(!busMarker) {
                    busMarker = L.marker(busPos, {icon: busIcon}).addTo(map);
                    map.flyTo(busPos, 17);
                } else {
                    busMarker.setLatLng(busPos);
                }
            } else {
                if(busMarker) map.removeLayer(busMarker);
                busMarker = null; busPos = null;
                statusLabel.innerText = "Bus fuera de línea"; statusLabel.style.color = "#9ca3af";
                trackBtn.style.display = "none";
            }
        }

        async function loadData() {
            const { data: stops } = await window.db.from('stops').select('*, students(*)').order('id');
            const root = document.getElementById('itinerary');
            stopMarkers.forEach(m => map.removeLayer(m)); stopMarkers = [];
            let content = ""; let anyActive = false;

            stops?.forEach((s, idx) => {
                const active = s.status === 'active';
                const done = s.status === 'completed';
                if(active && s.end_time) { window.endTime = s.end_time; anyActive = true; }
                
                stopMarkers.push(L.circleMarker([s.lat, s.lng], {color: active?'#ef4444':(done?'#4b5563':'#8b5cf6'), radius:8, fillOpacity:0.8}).addTo(map));
                const studs = s.students.map(st => `<div class="student-row">${st.name}</div>`).join('');
                
                content += `
                <div class="card" style="border-left:8px solid ${active?'#ef4444':(done?'#4b5563':'#8b5cf6')}; opacity:${done?0.6:1}">
                    <h3>📍 RUTA ${idx+1}: ${s.name} ${active ? '<small>(ACTUAL)</small>' : ''}</h3>
                    ${studs || '<small>Sin alumnos</small>'}
                </div>`;
            });
            if(!anyActive) window.endTime = null;
            root.innerHTML = content;
        }

        function runClock() {
            const box = document.getElementById('timer-box');
            if(!window.endTime) { box.style.display = 'none'; return; }
            const diff = Math.floor((new Date(window.endTime).getTime() - Date.now()) / 1000);
            if(diff > 0) {
                box.style.display = 'block';
                const m = Math.floor(diff/60), s = diff%60;
                document.getElementById('count-ui').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            } else { box.style.display = 'none'; window.endTime = null; }
        }
        function centerBus() { if(busPos) map.flyTo(busPos, 17); }
    </script>
</body>
</html>
