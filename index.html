<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario - RutaBinaria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="map" style="height: 450px;"></div>
        
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="centerBus()" id="track-btn" style="background:#3b82f6; width:80%; display:none;">📍 Rastrear Bus en Vivo</button>
            <span id="live-dot" style="color:#22c55e; font-size:0.7rem; display:none;">● LIVE</span>
        </div>

        <div id="timer-box" class="card" style="display:none; text-align:center; border:3px solid #ec4899; box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);">
            <h1 id="count-ui" style="font-size:4.5rem; margin:0;">00:00</h1>
            <p style="color:#ec4899; letter-spacing:3px; font-weight:bold;">BUS EN PARADA</p>
        </div>

        <div id="itinerary"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        let map, busMarker, busPos = null, globalEndTime = null;

        const busIcon = L.divIcon({
            html: `<div id="bus-node" style="font-size:30px; background:white; border-radius:50%; padding:5px; border:3px solid #8b5cf6; opacity:0; transition: all 1s linear;">🚍</div>`,
            className: 'custom-bus'
        });

        window.onload = async function() {
            map = L.map('map').setView([13.4795, -88.1729], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            busMarker = L.marker([0,0], {icon: busIcon}).addTo(map);

            loadData();

            // REALTIME BUS
            window.db.channel('bus-live').on('postgres_changes', {event:'UPDATE', table:'bus_location'}, p => {
                if(p.new.lat) {
                    busPos = [p.new.lat, p.new.lng];
                    busMarker.setLatLng(busPos);
                    document.getElementById('bus-node').style.opacity = "1";
                    document.getElementById('track-btn').style.display = "block";
                    document.getElementById('live-dot').style.display = "inline";
                }
            }).subscribe();

            // ACTUALIZACIÓN DE DATOS CADA 5 SEGUNDOS
            setInterval(loadData, 5000);

            // MOTOR DEL RELOJ (CADA 1 SEGUNDO)
            setInterval(runClockEngine, 1000);
        };

        async function loadData() {
            const { data: stops } = await window.db.from('stops').select('*, students(*)').order('id');
            const root = document.getElementById('itinerary');
            let content = "";
            let timerFound = false;

            stops?.forEach((s, idx) => {
                const active = s.status === 'active';
                const done = s.status === 'completed';
                if(active && s.end_time) { globalEndTime = s.end_time; timerFound = true; }

                const studs = s.students.map(st => `<div class="student-row">${st.name}</div>`).join('');
                content += `
                    <div class="card" style="border-left:8px solid ${active?'#ef4444':(done?'#6b7280':'#8b5cf6')}; opacity:${done?0.6:1}">
                        <h3>📍 RUTA ${idx+1}: ${s.name} ${active?'<span style="color:#ef4444"> (AQUÍ)</span>':''}</h3>
                        ${studs || '<small style="opacity:0.5">Esperando alumnos...</small>'}
                    </div>`;
            });
            root.innerHTML = content;
            if(!timerFound) { globalEndTime = null; document.getElementById('timer-box').style.display = 'none'; }
        }

        function runClockEngine() {
            if(!globalEndTime) return;
            const diff = Math.floor((new Date(globalEndTime).getTime() - Date.now()) / 1000);
            if(diff > 0) {
                document.getElementById('timer-box').style.display = 'block';
                const m = Math.floor(diff/60); const s = diff%60;
                document.getElementById('count-ui').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            } else {
                document.getElementById('timer-box').style.display = 'none';
                globalEndTime = null;
            }
        }

        function centerBus() { if(busPos) map.flyTo(busPos, 17); }
    </script>
</body>
</html>
