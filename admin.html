<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - RutaBinaria UGB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header class="card"><h1>Admin RutaBinaria 🚍</h1></header>
        <div id="map"></div>
        
        <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div>
                <h3>📍 Gestión de Paradas</h3>
                <input type="text" id="stop-name" placeholder="Nombre de la parada">
                <button onclick="addStop()" style="background:#f59e0b;">Guardar Pin Naranja</button>
                <hr style="opacity:0.1; margin:15px 0;">
                <button onclick="toggleGPS()" id="btn-gps" style="background:#4b5563;">📡 INICIAR TRANSMISIÓN GPS</button>
                <p id="gps-status" style="font-size:0.6rem; color:#22c55e; margin-top:5px; text-align:center;"></p>
            </div>
            <div>
                <h3>👤 Registrar Alumno</h3>
                <input type="text" id="s-name" placeholder="Nombre completo">
                <select id="s-stop-target"><option>Cargando...</option></select>
                <button onclick="registerStudent()">Vincular Alumno</button>
            </div>
        </div>

        <div class="card"><h3>📋 Gestión de Ruta y Alumnos</h3><div id="stops-container"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        let map, tempMarker, isGps = false, watchId = null;

        window.onload = () => {
            map = L.map('map').setView([13.4795, -88.1729], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            map.on('click', e => {
                if(tempMarker) map.removeLayer(tempMarker);
                tempMarker = L.circleMarker(e.latlng, {color:'#f59e0b', radius:12, fillOpacity:0.8}).addTo(map);
            });
            loadAdmin();
        };

        async function loadAdmin() {
            const { data: stops } = await window.db.from('stops').select('*, students(*)').order('id');
            const container = document.getElementById('stops-container');
            const select = document.getElementById('s-stop-target');
            container.innerHTML = ""; select.innerHTML = "";
            stops?.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                const studentsHtml = s.students.map(st => `
                    <div class="student-row"><span>${st.name}</span><button class="btn-small" style="background:#ef4444" onclick="delStudent(${st.id})">x</button></div>
                `).join('');
                container.innerHTML += `
                    <div class="stop-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${s.name} [${s.status}]</strong>
                            <div>
                                <button class="btn-small" style="background:#22c55e" onclick="setTimer(${s.id})">10m</button>
                                <button class="btn-small" style="background:#4b5563" onclick="updateStatus(${s.id},'completed')">Fin</button>
                                <button class="btn-small" style="background:#b91c1c" onclick="deleteStop(${s.id})">Del</button>
                            </div>
                        </div>
                        <div style="margin-top:8px;">${studentsHtml}</div>
                    </div>`;
            });
        }

        function toggleGPS() {
            const btn = document.getElementById('btn-gps');
            const status = document.getElementById('gps-status');
            if (!isGps) {
                isGps = true;
                btn.innerText = "🔴 TRANSMITIENDO EN VIVO...";
                btn.style.background = "#ef4444";
                watchId = navigator.geolocation.watchPosition(async p => {
                    const { latitude, longitude } = p.coords;
                    status.innerText = `Posición: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
                    await window.db.from('bus_location').update({ lat: latitude, lng: longitude }).eq('id', 1);
                }, null, { enableHighAccuracy: true });
            } else {
                isGps = false;
                if(watchId) navigator.geolocation.clearWatch(watchId);
                btn.innerText = "📡 INICIAR TRANSMISIÓN GPS";
                btn.style.background = "#4b5563";
                status.innerText = "";
            }
        }

        async function addStop() {
            const name = document.getElementById('stop-name').value;
            if(!tempMarker || !name) return alert("Nombre y clic en mapa");
            await window.db.from('stops').insert([{ name, lat: tempMarker.getLatLng().lat, lng: tempMarker.getLatLng().lng }]);
            location.reload();
        }

        async function setTimer(id) {
            const end = new Date(Date.now() + 10 * 60000).toISOString();
            await window.db.from('stops').update({ status: 'active', end_time: end }).eq('id', id);
            loadAdmin();
        }

        async function updateStatus(id, status) {
            await window.db.from('stops').update({ status, end_time: null }).eq('id', id);
            loadAdmin();
        }

        async function deleteStop(id) {
            if(confirm("¿Borrar parada?")) { await window.db.from('stops').delete().eq('id', id); location.reload(); }
        }

        async function registerStudent() {
            const name = document.getElementById('s-name').value;
            const stopId = document.getElementById('s-stop-target').value;
            await window.db.from('students').insert([{ name, stop_id: stopId, major: 'UGB', code: '2026' }]);
            loadAdmin();
        }

        async function delStudent(id) { await window.db.from('students').delete().eq('id', id); loadAdmin(); }
    </script>
</body>
</html>
